<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>녹취록</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

@font-face {
  font-family: 'MonoplexKR';
  src: url('./MonoplexKR-Light.ttf') format('truetype');
  font-weight: 300;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: 'Archivo';
  src: url('./Archivo-VariableFont_wdth_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}

:root {
  --bg: #000000;
  --white: #FFFFFF;
  --caption: #FFFFFF;
  --border: rgba(255,255,255,0.1);
  --mono: 'MonoplexKR', 'Courier New', Courier, monospace;
  --sans: 'MonoplexKR', 'Helvetica Neue', 'Apple SD Gothic Neo', Arial, sans-serif;
  /* MonoplexKR type spec */
  --mono-size: 14px;
  --mono-lh: 18.2px;
  --mono-ls: -0.015em;
}

/* MonoplexKR 전역 스펙 */
[class*="item-caption"],
[class*="entry-caption"],
[class*="a-ko"], [class*="a-en"],
[class*="d-copy"], [class*="d-key"], [class*="d-val"],
[class*="d-name"], [class*="d-cta"],
[class*="archive-ttl"], [class*="archive-info"],
[class*="adm-"], [class*="back"],
[class*="lb-"], [class*="lp-"],
[class*="suc-"], [class*="drw-"],
[class*="m-"] {
  font-family: var(--mono);
  font-weight: 300;
}

html, body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Archivo', 'MonoplexKR', sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}

/* MonoplexKR Light 전역 스펙 적용 */
.item-caption-line,
.item-caption-copy,
.entry-caption-name,
.entry-caption-copy,
.a-ko, .a-en,
.archive-ttl, .archive-info,
.d-copy, .d-key, .d-val,
.d-name-sm, .d-cta-sub, .d-cta-btn,
.back,
.drw-prompt,
.lp-eyebrow,
.lb-shop, .lb-ko, .lb-en, .lb-key, .lb-val, .lb-copy, .lb-date,
.suc-ttl, .suc-sub,
.adm-nm, .adm-en, .adm-add,
.m-ttl, .fl, .fi, .fh,
.dc, .br-lbl,
.go-preview, .act,
.s-overlay-input {
  font-family: var(--mono);
  font-weight: 300;
  font-size: var(--mono-size);
  line-height: var(--mono-lh);
  letter-spacing: var(--mono-ls);
}

.screen { display: none; }
.screen.active { display: block; }

/* ══════════════════════════════════
   BOTTOM FIXED NAV
══════════════════════════════════ */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  background: #000;
}

.nav-item {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Archivo', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  border: none;
  background: none;
  transition: color 0.15s;
  padding: 0;
}

.nav-item:hover { color: var(--white); }
.nav-item.active { color: var(--white); }

/* SEARCH 아이템 */
.nav-search-inner {
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-search-label {
  font-family: 'Archivo', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: inherit;
  flex-shrink: 0;
}

.nav-search-line {
  width: 40px;
  height: 1px;
  background: rgba(255,255,255,0.2);
  position: relative;
  overflow: hidden;
}

.nav-search-line::after {
  content: '';
  position: absolute;
  left: -100%; top: 0;
  width: 100%; height: 100%;
  background: var(--white);
  transition: left 0.3s ease;
}

.nav-item.active .nav-search-line::after { left: 0; }

.nav-search-icon {
  font-size: 11px;
  color: inherit;
  flex-shrink: 0;
}

/* 검색 오버레이 */
.search-overlay {
  position: fixed;
  bottom: 36px; left: 0; right: 0;
  z-index: 199;
  padding: 0 24px;
  background: #000;
  height: 0;
  overflow: hidden;
  transition: height 0.2s ease;
  display: flex;
  align-items: center;
}

.search-overlay.open {
  height: 44px;
}

.s-overlay-input {
  width: 100%;
  background: none;
  border: none;
  outline: none;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--white);
  letter-spacing: 0.06em;
}

.s-overlay-input::placeholder { color: rgba(255,255,255,0.18); }

.s-overlay-clear {
  font-size: 9px; color: rgba(255,255,255,0.25);
  cursor: pointer; background: none; border: none;
  font-family: var(--mono); flex-shrink: 0;
  display: none;
}
.s-overlay-clear.on { display: block; }

/* ══════════════════════════════════
   MAIN
══════════════════════════════════ */

/* 스크롤 컨테이너 */
.main-scroll {
  padding: 80px 0 120px;
}

/* 각 식물 항목 */
.plant-item {
  margin-bottom: 120px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.plant-item:hover .item-img { opacity: 0; }
.plant-item:hover .item-ascii { opacity: 1; }

/* 이미지 컨테이너 — 중앙 정렬, 폭 제한 */
.item-img-wrap {
  position: relative;
  width: 32vw;
  max-width: 420px;
  min-width: 200px;
  overflow: hidden;
}

@media (max-width: 600px) {
  .item-img-wrap { width: 70vw; }
}

.item-img {
  width: 100%;
  display: block;
  transition: opacity 0.04s;
}

.item-ascii {
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.04s;
  background: var(--bg);
  overflow: hidden;
}

.item-ascii canvas {
  width: 100%; height: 100%; display: block;
}

.item-placeholder {
  width: 100%;
  aspect-ratio: 3/4;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #111;
  font-size: 48px;
  color: #333;
  letter-spacing: -0.04em;
}

/* 캡션 — 이미지 아래, 가운데 정렬, 소문자, 모노 */
.item-caption {
  margin-top: 20px;
  text-align: center;
  line-height: 1.8;
}

.item-caption-line {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--caption);
}

.item-caption-copy {
  display: block;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.06em;
  color: rgba(255,255,255,0.2);
  margin-top: 4px;
  font-style: italic;
}

/* 플로팅 검색 */
.floating-search {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  width: min(320px, calc(100% - 80px));
}

.search-inner {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  height: 40px;
  padding: 0 14px;
  gap: 10px;
}

.s-tag {
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  flex-shrink: 0;
}

.s-input {
  flex: 1;
  background: none; border: none; outline: none;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--white);
  letter-spacing: 0.06em;
}

.s-input::placeholder { color: rgba(255,255,255,0.15); }

.s-clear {
  font-size: 9px; color: rgba(255,255,255,0.25);
  cursor: pointer; background: none; border: none;
  font-family: var(--mono);
  display: none;
}

.s-clear.on { display: block; }

/* 빈 검색 결과 */
.empty-msg {
  text-align: center;
  padding: 120px 0;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.15);
}

/* ══════════════════════════════════
   ARCHIVE — 그리드
══════════════════════════════════ */
#screenArchive { min-height: 100vh; }

.archive-top {
  padding: 80px 40px 32px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 1px solid var(--border);
}

.archive-ttl {
  font-size: clamp(32px, 5vw, 60px);
  font-weight: 400;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--white);
  font-family: var(--mono);
}

.archive-info {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--caption);
  text-align: right;
  line-height: 1.8;
}

.archive-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-left: 1px solid var(--border);
}

@media (max-width: 640px) {
  .archive-grid { grid-template-columns: repeat(2, 1fr); }
}

.a-card {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  aspect-ratio: 3/4;
  background: #0a0a0a;
}

.a-card:hover .a-img { opacity: 0; }
.a-card:hover .a-ascii { opacity: 1; }

.a-img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  position: absolute; inset: 0;
  transition: opacity 0.04s;
}

.a-ascii {
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.04s;
  background: var(--bg);
}

.a-ascii canvas { width:100%;height:100%;display:block; }

.a-placeholder {
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;color:#222;
}

.a-label {
  position: absolute;
  bottom:0;left:0;right:0;
  padding: 20px 12px 12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.88) 60%);
  z-index: 2;
}

.a-ko { font-size:11px;color:var(--white);letter-spacing:0.04em;margin-bottom:1px; }
.a-en { font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--caption); }

/* ══════════════════════════════════
   DETAIL
══════════════════════════════════ */
.d-topbar {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky; top:0;
  background: var(--bg);
  z-index: 50;
}

.back { font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--caption);background:none;border:none;font-family:var(--mono);cursor:pointer;transition:color 0.1s; }
.back:hover { color:var(--white); }

.d-name-sm { font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--caption); }

/* masonry photos */
.d-masonry {
  columns: 2;
  column-gap: 0;
  border-bottom: 1px solid var(--border);
}

@media (min-width: 700px) { .d-masonry { columns: 3; } }

.d-mitem {
  break-inside: avoid;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.d-mitem:hover .d-mimg { opacity: 0; }
.d-mitem:hover .d-mascii { opacity: 1; }

.d-mimg { width:100%;display:block;transition:opacity 0.04s; }

.d-mascii {
  position:absolute;inset:0;
  opacity:0;transition:opacity 0.04s;
  background:var(--bg);
}

.d-mascii canvas { width:100%;height:100%;display:block; }

/* info */
.d-info { padding:28px 24px;border-bottom:1px solid var(--border); }

.d-copy {
  font-size:clamp(13px,2vw,20px);
  line-height:1.5;
  color:var(--white);
  letter-spacing:-0.01em;
  margin-bottom:28px;
  font-style:italic;
}

.d-table {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  border-top:1px solid var(--border);
}

@media (min-width:600px) { .d-table { grid-template-columns:repeat(4,1fr); } }

.d-cell {
  padding:14px 14px 14px 0;
  border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);
}

.d-cell:nth-child(even) { padding-left:14px; }
@media (min-width:600px) { .d-cell:nth-child(even){padding-left:0;} .d-cell:last-child{border-right:none;} }

.d-key { font-size:8px;letter-spacing:0.16em;text-transform:uppercase;color:#444;margin-bottom:5px; }
.d-val { font-size:11px;color:var(--white);line-height:1.4; }

.d-cta { padding:28px 24px; }
.d-cta-sub { font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:var(--caption);margin-bottom:12px; }

.d-cta-btn {
  display:inline-block;padding:12px 24px;
  border:1px solid rgba(255,255,255,0.2);
  background:none;color:var(--white);
  font-family:var(--mono);font-size:10px;
  letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;transition:all 0.1s;
}

.d-cta-btn:hover { background:var(--white);color:var(--bg); }

/* ══════════════════════════════════
   DRAWING
══════════════════════════════════ */
.drw-top {
  padding:18px 24px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-start;
}

.drw-prompt { font-size:9px;letter-spacing:0.06em;color:var(--caption);line-height:1.8;max-width:200px;text-align:right; }

.drw-canvas-wrap { padding:24px; }

#drawCanvas {
  width:100%;aspect-ratio:3/1;
  background:#111;display:block;
  cursor:crosshair;touch-action:none;
}

.drw-controls { margin-top:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap; }

.dc {
  font-family:var(--mono);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;
  padding:7px 12px;border:1px solid rgba(255,255,255,0.15);
  background:none;color:var(--caption);cursor:pointer;transition:all 0.1s;
}

.dc:hover,.dc.on { border-color:var(--white);color:var(--white); }

.cdots { display:flex;gap:5px;margin-left:auto; }

.cdot {
  width:16px;height:16px;border-radius:50%;cursor:pointer;
  border:1.5px solid transparent;transition:border-color 0.1s;
}

.cdot.on { border-color:var(--white); }

input[type=range] {
  -webkit-appearance:none;width:72px;height:1px;
  background:rgba(255,255,255,0.15);outline:none;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none;width:10px;height:10px;
  background:var(--white);border-radius:50%;cursor:pointer;
}

.br-row { display:flex;align-items:center;gap:8px;margin-top:10px; }
.br-lbl { font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:#333; }

.go-preview {
  margin:0 24px 24px;display:block;width:calc(100% - 48px);
  padding:14px;border:1px solid rgba(255,255,255,0.15);
  background:none;color:var(--white);font-family:var(--mono);
  font-size:9px;letter-spacing:0.16em;text-transform:uppercase;
  cursor:pointer;transition:all 0.1s;
}

.go-preview:hover { background:var(--white);color:var(--bg); }

/* ══════════════════════════════════
   LABEL PREVIEW
══════════════════════════════════ */
.lp-wrap { padding:24px; }

.lp-eyebrow {
  font-size:8px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--caption);margin-bottom:18px;
}

#labelPreview {
  background:#F0EDE6;color:#111;
  padding:18px;margin-bottom:20px;
}

.lb-shop { font-family:var(--mono);font-size:7px;letter-spacing:0.2em;text-transform:uppercase;color:#999;margin-bottom:12px; }
.lb-row { display:flex;gap:12px;align-items:flex-start;margin-bottom:10px; }
.lb-sym { font-family:var(--mono);font-size:32px;font-weight:700;color:#111;line-height:1;letter-spacing:-0.04em;flex-shrink:0; }
.lb-ko { font-family:var(--mono);font-size:14px;font-weight:600;color:#111;margin-bottom:2px; }
.lb-en { font-family:var(--mono);font-size:7px;letter-spacing:0.1em;text-transform:uppercase;color:#999; }
.lb-drw { width:100%;border-top:0.5px solid #ddd;border-bottom:0.5px solid #ddd;margin:8px 0; }
.lb-drw img { width:100%;height:52px;object-fit:contain;display:block; }
.lb-grid { display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;margin-bottom:8px; }
.lb-key { font-family:var(--mono);font-size:7px;letter-spacing:0.14em;text-transform:uppercase;color:#aaa;margin-bottom:1px; }
.lb-val { font-family:var(--mono);font-size:9px;color:#111;font-weight:500; }
.lb-copy { font-family:var(--mono);font-size:8px;color:#999;border-top:0.5px solid #ddd;padding-top:7px;font-style:italic;line-height:1.5; }
.lb-foot { display:flex;justify-content:space-between;align-items:center;margin-top:7px; }
.lb-date { font-family:var(--mono);font-size:7px;color:#bbb;letter-spacing:0.08em; }
.lb-bar { display:flex;gap:1px;align-items:flex-end;height:13px; }
.lb-bar span { display:block;width:1.5px;background:#111; }

.act-row { display:flex;gap:10px; }
.act {
  flex:1;padding:13px;font-family:var(--mono);font-size:9px;
  letter-spacing:0.12em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,0.15);background:none;
  color:var(--white);cursor:pointer;transition:all 0.1s;
}
.act:hover { border-color:var(--white); }
.act.pr { background:var(--white);color:var(--bg);border-color:var(--white); }
.act.pr:hover { opacity:0.8; }

/* ══════════════════════════════════
   SUCCESS
══════════════════════════════════ */
.suc-wrap {
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px;text-align:center;gap:16px;
}

.suc-mark { font-size:40px;color:var(--white); }
.suc-ttl { font-size:16px;letter-spacing:-0.01em;color:var(--white); }
.suc-sub { font-size:9px;color:var(--caption);line-height:1.9;letter-spacing:0.08em; }
.suc-back {
  margin-top:8px;padding:11px 24px;
  border:1px solid rgba(255,255,255,0.15);background:none;
  color:var(--white);font-family:var(--mono);font-size:9px;
  letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;
  transition:all 0.1s;
}
.suc-back:hover { background:var(--white);color:var(--bg); }

/* ══════════════════════════════════
   ADMIN
══════════════════════════════════ */
.adm-wrap { max-width:560px;margin:0 auto;padding:80px 24px 60px; }

.adm-hd {
  font-size:8px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--caption);margin-bottom:20px;padding-bottom:14px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;
}

.adm-row {
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid var(--border);
}

.adm-nm { font-size:12px;color:var(--white); }
.adm-en { font-size:9px;color:var(--caption);margin-top:2px;letter-spacing:0.04em; }
.adm-btns { display:flex;gap:6px; }

.adm-btn {
  font-family:var(--mono);font-size:8px;letter-spacing:0.08em;
  padding:5px 10px;border:1px solid rgba(255,255,255,0.15);
  background:none;color:var(--caption);cursor:pointer;transition:all 0.1s;
}

.adm-btn:hover { border-color:var(--white);color:var(--white); }
.adm-btn.del:hover { border-color:#c00;color:#c00; }

.adm-add {
  width:100%;padding:12px;font-family:var(--mono);font-size:8px;
  letter-spacing:0.16em;text-transform:uppercase;
  border:1px dashed rgba(255,255,255,0.12);background:none;
  color:var(--caption);cursor:pointer;margin-top:12px;transition:all 0.1s;
}

.adm-add:hover { border-color:rgba(255,255,255,0.4);color:var(--white); }

/* MODAL */
.m-ov {
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.8);z-index:300;
  align-items:flex-end;justify-content:center;
}
.m-ov.open { display:flex; }

.m-box {
  background:#111;border-top:1px solid var(--border);
  width:100%;max-width:560px;max-height:88svh;overflow-y:auto;
  padding:24px 20px 44px;
}

.m-ttl { font-size:11px;color:var(--white);margin-bottom:20px;letter-spacing:0.04em; }

.fg { margin-bottom:12px; }

.fl {
  display:block;font-size:7px;letter-spacing:0.18em;

// ══════════════════════════════
// ASCII ENGINE
// ══════════════════════════════
const ASCII = ' .,:;+*?%S#@';

function renderASCII(imgEl, canvas) {
  const W = canvas.offsetWidth; const H = canvas.offsetHeight;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const FS = 7; const CW = FS * 0.56; const CH = FS;
  const cols = Math.floor(W / CW); const rows = Math.floor(H / CH);
  const off = document.createElement('canvas');
  off.width = cols; off.height = rows;
  const octx = off.getContext('2d');
  octx.drawImage(imgEl, 0, 0, cols, rows);
  const px = octx.getImageData(0,0,cols,rows).data;
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#fff';
  ctx.font = `${FS}px 'Courier New', monospace`;
  ctx.textBaseline = 'top';
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
    const i=(r*cols+c)*4;
    const b=(px[i]*.299+px[i+1]*.587+px[i+2]*.114)/255;
    ctx.fillText(ASCII[Math.floor(b*(ASCII.length-1))], c*CW, r*CH);
  }
}

function attachAscii(triggerEl, imgEl, asciiWrap) {
  const cv = asciiWrap.querySelector('canvas');
  let done = false;
  const go = () => {
    triggerEl.addEventListener('mouseenter', () => {
      if (!done && imgEl.complete && imgEl.naturalWidth > 0) {
        cv.style.width = '100%'; cv.style.height = '100%';
        renderASCII(imgEl, cv);
        done = true;
      }
    });
    window.addEventListener('resize', () => { done = false; });
  };
  if (imgEl.complete && imgEl.naturalWidth > 0) go();
  else imgEl.addEventListener('load', go);
}

// MAIN LIST

function renderList(list) {

    if (!imgEl || !asciiDiv || !wrap) return;
    attachAscii(wrap, imgEl, asciiDiv);
  });
}

// ══════════════════════════════
// CANVAS
// ══════════════════════════════
function initCanvas() {
  const c = document.getElementById('drawCanvas');
  const r = c.getBoundingClientRect();
  c.width = r.width * devicePixelRatio;
  c.height = r.height * devicePixelRatio;
  const ctx = c.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  ctx.fillStyle = '#111'; ctx.fillRect(0,0,r.width,r.height);
}

const dc = document.getElementById('drawCanvas');
function getPos(e, el) {
  const r = el.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX-r.left, y: t.clientY-r.top };
}

dc.addEventListener('mousedown', e=>{isDrawing=true;const p=getPos(e,dc);lastX=p.x;lastY=p.y;});
dc.addEventListener('mousemove', e=>{
  if(!isDrawing)return;
  const ctx=dc.getContext('2d');const p=getPos(e,dc);const sz=parseInt(document.getElementById('bSz').value);
  ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);
  ctx.strokeStyle=currentTool==='erase'?'#111':currentColor;
  ctx.lineWidth=currentTool==='erase'?sz*3:sz;
  ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  lastX=p.x;lastY=p.y;
});
dc.addEventListener('mouseup',()=>isDrawing=false);
dc.addEventListener('mouseleave',()=>isDrawing=false);
dc.addEventListener('touchstart',e=>{e.preventDefault();isDrawing=true;const p=getPos(e,dc);lastX=p.x;lastY=p.y;},{passive:false});
dc.addEventListener('touchmove',e=>{
  e.preventDefault();if(!isDrawing)return;
  const ctx=dc.getContext('2d');const p=getPos(e,dc);const sz=parseInt(document.getElementById('bSz').value);
  ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);
  ctx.strokeStyle=currentTool==='erase'?'#111':currentColor;
  ctx.lineWidth=currentTool==='erase'?sz*3:sz;
  ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  lastX=p.x;lastY=p.y;
},{passive:false});
dc.addEventListener('touchend',()=>isDrawing=false);

function clearCanvas() {
  const c=document.getElementById('drawCanvas');
  const ctx=c.getContext('2d');
  ctx.fillStyle='#111';ctx.fillRect(0,0,c.width,c.height);
}
function setTool(t) {
  currentTool=t;
  document.getElementById('btnDrw').classList.toggle('on',t==='draw');
  document.getElementById('btnErs').classList.toggle('on',t==='erase');
}
function setColor(i) {
  currentColor=colors[i];
  document.querySelectorAll('.cdot').forEach((d,idx)=>d.classList.toggle('on',idx===i));
  setTool('draw');
}

// ══════════════════════════════
// PREVIEW & PRINT
// ══════════════════════════════
function goPreview() {
  if (!selectedPlant) return;
  document.getElementById('lKo').textContent = selectedPlant.nameKo;
  document.getElementById('lEn').textContent = selectedPlant.nameEn;
  document.getElementById('lWater').textContent = selectedPlant.water;
  document.getElementById('lSun').textContent = selectedPlant.sun;
  document.getElementById('lTemp').textContent = selectedPlant.temp;
  document.getElementById('lAir').textContent = selectedPlant.air;
  document.getElementById('lCopy').textContent = selectedPlant.copy;
  const now = new Date();
  document.getElementById('lDate').textContent =
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  document.getElementById('lImg').src = document.getElementById('drawCanvas').toDataURL('image/png');
  document.getElementById('lBar').innerHTML =
    [14,9,14,6,12,9,14,7,12,14,9].map(h=>`<span style="height:${h}px"></span>`).join('');
  showScreen('screenPreview');
}

function printLabel() {
  const el = document.getElementById('labelPreview');
  const pw = window.open('','_blank','width=300,height=600');
  pw.document.write(`<!DOCTYPE html><html><head>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Courier New',monospace;width:62mm;background:#F0EDE6}
    @media print{@page{size:62mm auto;margin:0}body{-webkit-print-color-adjust:exact}}</style>
    </head><body>${el.innerHTML}</body></html>`);
  pw.document.close();
  pw.onload=()=>{pw.print();pw.close();};
  showScreen('screenSuccess');
}

function restart() { selectedPlant=null; closeSearch(); navGo('screenMain'); }

// ══════════════════════════════
// ADMIN
// ══════════════════════════════
function renderAdminList() {
  document.getElementById('admList').innerHTML = plants.map(p=>`
    <div class="adm-row">
      <div><div class="adm-nm">${p.nameKo}</div><div class="adm-en">${p.nameEn}</div></div>
      <div class="adm-btns">
        <button class="adm-btn" onclick="openModal(${p.id})">수정</button>
        <button class="adm-btn del" onclick="deletePlant(${p.id})">삭제</button>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  document.getElementById('eId').value = id||'';
  if (id) {
    const p = plants.find(pl=>pl.id===id);
    document.getElementById('mTtl').textContent='식물 수정';
    document.getElementById('fKo').value=p.nameKo;
    document.getElementById('fEn').value=p.nameEn;
    document.getElementById('fImgs').value=(p.images||[]).join(', ');
    document.getElementById('fWater').value=p.water;
    document.getElementById('fSun').value=p.sun;
    document.getElementById('fTemp').value=p.temp;
    document.getElementById('fAir').value=p.air;
    document.getElementById('fCopy').value=p.copy;
  } else {
    document.getElementById('mTtl').textContent='새 식물 추가';
    ['fKo','fEn','fImgs','fWater','fSun','fTemp','fAir','fCopy'].forEach(f=>document.getElementById(f).value='');
  }
  document.getElementById('mOv').classList.add('open');
}

function closeModal() { document.getElementById('mOv').classList.remove('open'); }
function closeModalOut(e) { if(e.target===document.getElementById('mOv')) closeModal(); }

function savePlant() {
  const id=document.getElementById('eId').value;
  const raw=document.getElementById('fImgs').value;
  const images=raw?raw.split(',').map(s=>s.trim()).filter(Boolean):[];
  const data={
    nameKo:document.getElementById('fKo').value.trim(),
    nameEn:document.getElementById('fEn').value.trim(),
    images,
    water:document.getElementById('fWater').value.trim(),
    sun:document.getElementById('fSun').value.trim(),
    temp:document.getElementById('fTemp').value.trim(),
    air:document.getElementById('fAir').value.trim(),
    copy:document.getElementById('fCopy').value.trim(),
  };
  if(!data.nameKo){alert('식물 이름을 입력해주세요');return;}
  if(id){
    const idx=plants.findIndex(p=>p.id===parseInt(id));
    plants[idx]={...plants[idx],...data};
  } else {
    data.id=Date.now();plants.push(data);
  }
  savePlants();renderAdminList();renderList(plants);closeModal();
}

function deletePlant(id) {
  if(!confirm('삭제할까요?'))return;
  plants=plants.filter(p=>p.id!==id);
  savePlants();renderAdminList();renderList(plants);
}

// ══════════════════════════════
// INIT
// ══════════════════════════════
renderList(plants);
</script>
