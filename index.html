<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>녹취록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

@font-face {
  font-family: 'MonoplexKR';
  src: url('./MonoplexKR-Light.ttf') format('truetype');
  font-weight: 300;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: 'nokchilog_3';
  src: url('./nokchilog_3-Regular.woff') format('woff');
  font-weight: 400;
  font-style: normal;
  font-display: block;
}

/* 한글만 size-adjust로 축소 */
@font-face {
  font-family: 'Nanum Gothic Coding';
  src: local('Nanum Gothic Coding');
  unicode-range: U+AC00-D7A3, U+1100-11FF, U+3130-318F, U+A960-A97F, U+D7B0-D7FF;
  size-adjust: 80%;
}

@font-face {
  font-family: 'Archivo';
  src: url('./Archivo-VariableFont_wdth_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}

:root {
  --bg: #000000;
  --white: #FFFFFF;
  --caption: #FFFFFF;
  --border: rgba(255,255,255,0.1);
  --mono: 'Nanum Gothic Coding', 'Courier New', Courier, monospace;
  --sans: 'Nanum Gothic Coding', 'Helvetica Neue', 'Apple SD Gothic Neo', Arial, sans-serif;
  /* MonoplexKR type spec */
  --mono-size: 13px;
  --mono-lh: 18.2px;
  --mono-ls: 0.04em;
}

/* MonoplexKR 전역 스펙 */
[class*="item-caption"],
[class*="entry-caption"],
[class*="a-ko"], [class*="a-en"],
[class*="d-copy"], [class*="d-key"], [class*="d-val"],
[class*="d-name"], [class*="d-cta"],
[class*="archive-ttl"], [class*="archive-info"],
[class*="adm-"], [class*="back"],
[class*="lb-"], [class*="lp-"],
[class*="suc-"], [class*="drw-"],
[class*="m-"] {
  font-family: var(--mono);
  font-weight: 300;
}

html, body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Archivo', 'Nanum Gothic Coding', sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}

/* MonoplexKR Light 전역 스펙 적용 */
.item-caption-line,
.item-caption-copy,
.entry-caption-name,
.entry-caption-copy,
.a-ko, .a-en,
.archive-ttl, .archive-info,
.d-copy, .d-key, .d-val,
.d-name-sm, .d-cta-sub, .d-cta-btn,
.back,
.drw-prompt,
.lp-eyebrow,
.lb-shop, .lb-ko, .lb-en, .lb-key, .lb-val, .lb-copy, .lb-date,
.suc-ttl, .suc-sub,
.adm-nm, .adm-en, .adm-add,
.m-ttl, .fl, .fi, .fh,
.dc, .br-lbl,
.go-preview, .act,
.s-overlay-input {
  font-family: var(--mono);
  font-weight: 300;
  font-size: var(--mono-size);
  line-height: var(--mono-lh);
  letter-spacing: var(--mono-ls);
}

.screen { display: none; }
.screen.active { display: block; }

/* ══════════════════════════════════
   BOTTOM FIXED NAV
══════════════════════════════════ */
/* ── 하단 네비 래퍼 ── */
.nav-wrap {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  mix-blend-mode: screen;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom);
}

/* 메인 네비 행 */
.bottom-nav {
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  background: none;
  padding: 0 20px;
  pointer-events: none;
}

.nav-item {
  font-family: 'Archivo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  border: none;
  background: none;
  transition: color 0.15s;
  padding: 0;
  pointer-events: auto;
}
.nav-item:hover, .nav-item.active { color: var(--white); }

/* nav-item 트랜지션 */
.nav-item {
  transition: opacity 0.22s ease, color 0.15s;
}
/* 서치 열릴 때 두 단어 페이드아웃 (제자리) */
.nav-wrap.search-open .nav-item {
  opacity: 0;
  pointer-events: none;
}

/* 돋보기 아이콘 — nav-item과 동일 위계, 오른쪽 고정 */
.nav-search-btn {
  position: absolute;
  right: 20px;
  font-size: 20px;
  line-height: 1;
  color: rgba(255,255,255,0.4);
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  pointer-events: auto;
  transition: color 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-search-btn:hover,
.nav-search-btn.active { color: var(--white); }
.nav-search-btn .icon-search { display: inline; }
.nav-search-btn .icon-back   { display: none; font-size: 18px; }
.nav-search-btn.active .icon-search { display: none; }
.nav-search-btn.active .icon-back   { display: inline; }

/* ── 서치 인풋 오버레이 — 같은 행, 두 단어 자리에 치환 ── */
.nav-search-overlay {
  position: absolute;
  left: 20px;
  right: 52px;
  top: 0; bottom: 0;
  display: flex;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease;
}
.nav-wrap.search-open .nav-search-overlay {
  opacity: 1;
  pointer-events: auto;
}
.nav-search-input {
  flex: 1;
  background: none;
  border: none;
  border-bottom: 1.5px solid rgba(255,255,255,0.5);
  outline: none;
  font-family: 'Archivo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--white);
  padding-bottom: 3px;
}
.nav-search-input::placeholder { color: rgba(255,255,255,0.3); }

/* 검색 오버레이 — 비활성화 */
.search-overlay { display: none; }
.nav-search-inner, .nav-search-label, .nav-search-input-wrap,
.nav-search-line, .nav-search-icon { display: none; }

.s-overlay-input {
  background: none;
  border: none;
  outline: none;
  font-family: 'Archivo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  color: var(--white);
  padding: 0;
  width: 100%;
  min-width: 0;
}
.s-overlay-input::placeholder { color: rgba(255,255,255,0.3); }
.s-overlay-clear {
  font-size: 11px; color: rgba(255,255,255,0.4);
  cursor: pointer; background: none; border: none;
  font-family: var(--mono); flex-shrink: 0; display: none; padding: 0;
}
.s-overlay-clear.on { display: block; }

.s-panel-label {
  font-family: 'Archivo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  color: var(--white);
  flex-shrink: 0;
}

.s-input-row {
  flex: 1;
  display: flex;
  align-items: center;
  border-bottom: 1.5px solid var(--white);
  padding-bottom: 2px;
}

.s-icon {
  font-size: 18px;
  color: var(--white);
  flex-shrink: 0;
  line-height: 1;
  margin-left: 8px;
}

.s-overlay-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 300;
  color: var(--white);
  letter-spacing: var(--mono-ls);
  padding: 0;
}

.s-overlay-input::placeholder {
  color: rgba(255,255,255,0.3);
}

.s-overlay-clear {
  font-family: 'Archivo', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--white);
  cursor: pointer;
  background: none;
  border: none;
  flex-shrink: 0;
  display: none;
  padding: 0;
  mix-blend-mode: screen;
}
.s-overlay-clear.on { display: block; }

/* ══════════════════════════════════
   MAIN
══════════════════════════════════ */

/* 스크롤 컨테이너 */
.main-scroll {
  padding: 80px 0 120px;
  padding-bottom: calc(120px + env(safe-area-inset-bottom));
}

/* 각 식물 항목 */
.plant-item {
  margin-bottom: 200px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.plant-item:hover .item-img { opacity: 0; }
.plant-item:hover .item-ascii { opacity: 1; }
.plant-item.ascii-active .item-img { opacity: 0; }
.plant-item.ascii-active .item-ascii { opacity: 1; }

/* 이미지 컨테이너 — 중앙 정렬, 폭 제한 */
.item-img-wrap {
  position: relative;
  width: 60vw;
  max-width: 680px;
  min-width: 280px;
  overflow: hidden;
}

@media (max-width: 600px) {
  .item-img-wrap {
    width: calc(100vw - 48px);
    max-width: none;
    min-width: 0;
  }
  .plant-item {
    margin-bottom: 200px;
  }
  .item-caption {
    padding: 0 24px;
  }
  :root {
    --mono-size: 12px;
    --mono-lh: 16.2px;
  }
}

.item-img {
  width: 100%;
  display: block;
  transition: opacity 0.04s;
}

.item-ascii {
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.04s;
  background: var(--bg);
  overflow: hidden;
}

.item-ascii canvas {
  width: 100%; height: 100%; display: block;
}
.item-ascii.ascii-loading::after {
  content: '...';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Archivo', sans-serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.25);
}

.item-placeholder {
  width: 100%;
  aspect-ratio: 3/4;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #111;
  font-size: 48px;
  color: #333;
  letter-spacing: -0.04em;
}

/* 캡션 — 이미지 아래, 가운데 정렬 */
.item-caption {
  margin-top: 40px;
  text-align: center;
}

.item-caption-row {
  display: block;
  font-family: var(--mono);
  font-weight: 300;
  font-size: var(--mono-size);
  line-height: var(--mono-lh);
  letter-spacing: var(--mono-ls);
  color: var(--white);
  text-transform: uppercase;
}

.item-caption-row .lbl {
  color: rgba(255,255,255,0.55);
}

.item-caption-copy {
  display: block;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.06em;
  color: rgba(255,255,255,0.2);
  margin-top: 4px;
  font-style: italic;
}

/* 플로팅 검색 */
.floating-search {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  width: min(320px, calc(100% - 80px));
}

.search-inner {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  height: 40px;
  padding: 0 14px;
  gap: 10px;
}

.s-tag {
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  flex-shrink: 0;
}

.s-input {
  flex: 1;
  background: none; border: none; outline: none;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--white);
  letter-spacing: 0.06em;
}

.s-input::placeholder { color: rgba(255,255,255,0.15); }

.s-clear {
  font-size: 9px; color: rgba(255,255,255,0.25);
  cursor: pointer; background: none; border: none;
  font-family: var(--mono);
  display: none;
}

.s-clear.on { display: block; }

/* 빈 검색 결과 */
.empty-msg {
  text-align: center;
  padding: 120px 0;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.15);
}

/* ══════════════════════════════════
   ARCHIVE — 그리드
══════════════════════════════════ */
#screenArchive { min-height: 100vh; }

.archive-top {
  padding: 80px 40px 32px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 1px solid var(--border);
}

.archive-ttl {
  font-size: clamp(32px, 5vw, 60px);
  font-weight: 400;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--white);
  font-family: var(--mono);
}

.archive-info {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--caption);
  text-align: right;
  line-height: 1.8;
}

.archive-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-left: 1px solid var(--border);
}

@media (max-width: 640px) {
  .archive-grid { grid-template-columns: repeat(2, 1fr); }
}

.a-card {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  aspect-ratio: 3/4;
  background: #0a0a0a;
}

.a-card:hover .a-img { opacity: 0; }
.a-card:hover .a-ascii { opacity: 1; }

.a-imgs {
  position: absolute; inset: 0;
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.a-imgs::-webkit-scrollbar { display: none; }

.a-img {
  flex: 0 0 100%;
  width: 100%; height: 100%;
  object-fit: cover;
  scroll-snap-align: start;
  transition: opacity 0.04s;
}

.a-dots {
  position: absolute; bottom: 6px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 4px;
  pointer-events: none; z-index: 2;
}
.a-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transition: background 0.2s;
}
.a-dot.on { background: #fff; }

.a-ascii {
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.04s;
  background: var(--bg);
}

.a-ascii canvas { width:100%;height:100%;display:block; }

.a-placeholder {
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;color:#222;
}

.a-label {
  position: absolute;
  bottom:0;left:0;right:0;
  padding: 20px 12px 12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.88) 60%);
  z-index: 2;
}

.a-ko { font-size:11px;color:var(--white);letter-spacing:0.04em;margin-bottom:1px; }
.a-en { font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--caption); }

/* ══════════════════════════════════
   DETAIL
══════════════════════════════════ */
.d-topbar {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky; top:0;
  background: var(--bg);
  z-index: 50;
}

.back { font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--caption);background:none;border:none;font-family:var(--mono);cursor:pointer;transition:color 0.1s; }
.back:hover { color:var(--white); }

.d-name-sm { font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--caption); }

/* masonry photos */
.d-masonry {
  columns: 2;
  column-gap: 0;
  border-bottom: 1px solid var(--border);
}

@media (min-width: 700px) { .d-masonry { columns: 3; } }

.d-mitem {
  break-inside: avoid;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.d-mitem:hover .d-mimg { opacity: 0; }
.d-mitem:hover .d-mascii { opacity: 1; }

.d-mimg { width:100%;display:block;transition:opacity 0.04s; }

.d-mascii {
  position:absolute;inset:0;
  opacity:0;transition:opacity 0.04s;
  background:var(--bg);
}

.d-mascii canvas { width:100%;height:100%;display:block; }

/* info */
.d-info { padding:28px 24px;border-bottom:1px solid var(--border); }

.d-copy {
  font-size:clamp(13px,2vw,20px);
  line-height:1.5;
  color:var(--white);
  letter-spacing:-0.01em;
  margin-bottom:28px;
  font-style:italic;
}

.d-table {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  border-top:1px solid var(--border);
}

@media (min-width:600px) { .d-table { grid-template-columns:repeat(4,1fr); } }

.d-cell {
  padding:14px 14px 14px 0;
  border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);
}

.d-cell:nth-child(even) { padding-left:14px; }
@media (min-width:600px) { .d-cell:nth-child(even){padding-left:0;} .d-cell:last-child{border-right:none;} }

.d-key { font-size:8px;letter-spacing:0.16em;text-transform:uppercase;color:#444;margin-bottom:5px; }
.d-val { font-size:11px;color:var(--white);line-height:1.4; }

.d-cta { padding:28px 24px; }
.d-cta-sub { font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:var(--caption);margin-bottom:12px; }

.d-cta-btn {
  display:inline-block;padding:12px 24px;
  border:1px solid rgba(255,255,255,0.2);
  background:none;color:var(--white);
  font-family:var(--mono);font-size:10px;
  letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;transition:all 0.1s;
}

.d-cta-btn:hover { background:var(--white);color:var(--bg); }

/* ══════════════════════════════════
   DRAWING
══════════════════════════════════ */
.drw-top {
  padding:18px 24px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-start;
}

.drw-prompt { font-size:9px;letter-spacing:0.06em;color:var(--caption);line-height:1.8;max-width:200px;text-align:right; }

.drw-canvas-wrap { padding:24px; }

#drawCanvas {
  width:100%;aspect-ratio:3/1;
  background:#111;display:block;
  cursor:crosshair;touch-action:none;
}

.drw-controls { margin-top:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap; }

.dc {
  font-family:var(--mono);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;
  padding:7px 12px;border:1px solid rgba(255,255,255,0.15);
  background:none;color:var(--caption);cursor:pointer;transition:all 0.1s;
}

.dc:hover,.dc.on { border-color:var(--white);color:var(--white); }

.cdots { display:flex;gap:5px;margin-left:auto; }

.cdot {
  width:16px;height:16px;border-radius:50%;cursor:pointer;
  border:1.5px solid transparent;transition:border-color 0.1s;
}

.cdot.on { border-color:var(--white); }

input[type=range] {
  -webkit-appearance:none;width:72px;height:1px;
  background:rgba(255,255,255,0.15);outline:none;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none;width:10px;height:10px;
  background:var(--white);border-radius:50%;cursor:pointer;
}

.br-row { display:flex;align-items:center;gap:8px;margin-top:10px; }
.br-lbl { font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:#333; }

.go-preview {
  margin:0 24px 24px;display:block;width:calc(100% - 48px);
  padding:14px;border:1px solid rgba(255,255,255,0.15);
  background:none;color:var(--white);font-family:var(--mono);
  font-size:9px;letter-spacing:0.16em;text-transform:uppercase;
  cursor:pointer;transition:all 0.1s;
}

.go-preview:hover { background:var(--white);color:var(--bg); }

/* ══════════════════════════════════
   LABEL PREVIEW
══════════════════════════════════ */
.lp-wrap { padding:24px; }

.lp-eyebrow {
  font-size:8px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--caption);margin-bottom:18px;
}

#labelPreview {
  background:#F0EDE6;color:#111;
  padding:18px;margin-bottom:20px;
}

.lb-shop { font-family:var(--mono);font-size:7px;letter-spacing:0.2em;text-transform:uppercase;color:#999;margin-bottom:12px; }
.lb-row { display:flex;gap:12px;align-items:flex-start;margin-bottom:10px; }
.lb-sym { font-family:var(--mono);font-size:32px;font-weight:700;color:#111;line-height:1;letter-spacing:-0.04em;flex-shrink:0; }
.lb-ko { font-family:var(--mono);font-size:14px;font-weight:600;color:#111;margin-bottom:2px; }
.lb-en { font-family:var(--mono);font-size:7px;letter-spacing:0.1em;text-transform:uppercase;color:#999; }
.lb-drw { width:100%;border-top:0.5px solid #ddd;border-bottom:0.5px solid #ddd;margin:8px 0; }
.lb-drw img { width:100%;height:52px;object-fit:contain;display:block; }
.lb-grid { display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;margin-bottom:8px; }
.lb-key { font-family:var(--mono);font-size:7px;letter-spacing:0.14em;text-transform:uppercase;color:#aaa;margin-bottom:1px; }
.lb-val { font-family:var(--mono);font-size:9px;color:#111;font-weight:500; }
.lb-copy { font-family:var(--mono);font-size:8px;color:#999;border-top:0.5px solid #ddd;padding-top:7px;font-style:italic;line-height:1.5; }
.lb-foot { display:flex;justify-content:space-between;align-items:center;margin-top:7px; }
.lb-date { font-family:var(--mono);font-size:7px;color:#bbb;letter-spacing:0.08em; }
.lb-bar { display:flex;gap:1px;align-items:flex-end;height:13px; }
.lb-bar span { display:block;width:1.5px;background:#111; }

.act-row { display:flex;gap:10px; }
.act {
  flex:1;padding:13px;font-family:var(--mono);font-size:9px;
  letter-spacing:0.12em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,0.15);background:none;
  color:var(--white);cursor:pointer;transition:all 0.1s;
}
.act:hover { border-color:var(--white); }
.act.pr { background:var(--white);color:var(--bg);border-color:var(--white); }
.act.pr:hover { opacity:0.8; }

/* ══════════════════════════════════
   SUCCESS
══════════════════════════════════ */
.suc-wrap {
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px;text-align:center;gap:16px;
}

.suc-mark { font-size:40px;color:var(--white); }
.suc-ttl { font-size:16px;letter-spacing:-0.01em;color:var(--white); }
.suc-sub { font-size:9px;color:var(--caption);line-height:1.9;letter-spacing:0.08em; }
.suc-back {
  margin-top:8px;padding:11px 24px;
  border:1px solid rgba(255,255,255,0.15);background:none;
  color:var(--white);font-family:var(--mono);font-size:9px;
  letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;
  transition:all 0.1s;
}
.suc-back:hover { background:var(--white);color:var(--bg); }

/* ══════════════════════════════════
   ADMIN
══════════════════════════════════ */
.adm-wrap { max-width:560px;margin:0 auto;padding:80px 24px 60px; }

.adm-hd {
  font-size:8px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--caption);margin-bottom:20px;padding-bottom:14px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;
}

.adm-row {
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid var(--border);
}

.adm-nm { font-size:12px;color:var(--white); }
.adm-en { font-size:9px;color:var(--caption);margin-top:2px;letter-spacing:0.04em; }
.adm-btns { display:flex;gap:6px; }

.adm-btn {
  font-family:var(--mono);font-size:8px;letter-spacing:0.08em;
  padding:5px 10px;border:1px solid rgba(255,255,255,0.15);
  background:none;color:var(--caption);cursor:pointer;transition:all 0.1s;
}

.adm-btn:hover { border-color:var(--white);color:var(--white); }
.adm-btn.del:hover { border-color:#c00;color:#c00; }

.adm-add {
  width:100%;padding:12px;font-family:var(--mono);font-size:8px;
  letter-spacing:0.16em;text-transform:uppercase;
  border:1px dashed rgba(255,255,255,0.12);background:none;
  color:var(--caption);cursor:pointer;margin-top:12px;transition:all 0.1s;
}

.adm-add:hover { border-color:rgba(255,255,255,0.4);color:var(--white); }

/* MODAL */
.m-ov {
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.8);z-index:300;
  align-items:flex-end;justify-content:center;
}
.m-ov.open { display:flex; }

.m-box {
  background:#111;border-top:1px solid var(--border);
  width:100%;max-width:560px;max-height:88svh;overflow-y:auto;
  padding:24px 20px 44px;
}

.m-ttl { font-size:11px;color:var(--white);margin-bottom:20px;letter-spacing:0.04em; }

.fg { margin-bottom:12px; }

.fl {
  display:block;font-size:7px;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--caption);margin-bottom:5px;
}

.fi {
  width:100%;padding:9px 11px;
  border:1px solid rgba(255,255,255,0.1);
  background:#000;font-family:var(--mono);
  font-size:12px;color:var(--white);outline:none;
  transition:border-color 0.15s;-webkit-appearance:none;border-radius:0;
}

.fi:focus { border-color:rgba(255,255,255,0.4); }

.fh { font-size:8px;color:#333;margin-top:3px;line-height:1.6;letter-spacing:0.03em; }

.fr { display:grid;grid-template-columns:1fr 1fr;gap:10px; }

.m-acts { display:flex;gap:8px;margin-top:18px; }

.m-save {
  flex:1;padding:12px;background:var(--white);color:var(--bg);
  border:none;font-family:var(--mono);font-size:9px;
  letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;
}

.m-cancel {
  padding:12px 16px;background:none;
  border:1px solid rgba(255,255,255,0.15);
  font-family:var(--mono);font-size:9px;color:var(--caption);cursor:pointer;
}

::-webkit-scrollbar { width:2px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#222; }
</style>
</head>

<!-- ═══ BOTTOM NAV ═══ -->
<div class="nav-wrap">
  <nav class="bottom-nav" style="position:relative;">

        <line x1="11" y1="11" x2="16" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <!-- 원형 화살표 — 10시 위치 화살촉, CW 270° -->
      <svg class="icon-back" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">

  </nav>

<!-- ══════════════ MAIN ══════════════ -->
<div id="screenMain" class="screen active">

  <div class="main-scroll" id="mainScroll">
    <!-- 식물 목록 렌더링 -->
  </div>
</div>

<!-- ══════════════ ARCHIVE ══════════════ -->
<div id="screenArchive" class="screen">
  <div class="archive-top">
    <div class="archive-ttl">Archive</div>
    <div class="archive-info" id="aInfo"></div>
  </div>
  <div class="archive-grid" id="aGrid"></div>
</div>

<!-- ══════════════ DETAIL ══════════════ -->
<div id="screenDetail" class="screen">
  <div class="d-topbar">
    <button class="back" onclick="detailBack()">← back</button>
    <div class="d-name-sm" id="dSm">—</div>
  </div>

  <div class="d-masonry" id="dMasonry"></div>

  <div class="d-info">
    <div class="d-copy" id="dCopy">—</div>
    <div class="d-table">
      <div class="d-cell"><div class="d-key">물 주기</div><div class="d-val" id="dWater">—</div></div>
      <div class="d-cell"><div class="d-key">햇빛</div><div class="d-val" id="dSun">—</div></div>
      <div class="d-cell"><div class="d-key">최적 온도</div><div class="d-val" id="dTemp">—</div></div>
      <div class="d-cell"><div class="d-key">통풍</div><div class="d-val" id="dAir">—</div></div>
    </div>
  </div>

  <div class="d-cta">
    <div class="d-cta-sub">이 식물과 함께하기</div>
    <button class="d-cta-btn" onclick="goDrawing()">나만의 라벨 만들기 →</button>
  </div>
</div>

<!-- ══════════════ DRAWING ══════════════ -->
<div id="screenDrawing" class="screen">
  <div class="drw-top">
    <button class="back" onclick="showScreen('screenDetail')">← back</button>
    <div class="drw-prompt">
      이 식물과의 첫 순간을 그려보세요.<br>
      라벨에 담겨 함께 집으로 갑니다.
    </div>
  </div>

  <div class="drw-canvas-wrap">
    <canvas id="drawCanvas"></canvas>

    <div class="drw-controls">
      <button class="dc on" id="btnDrw" onclick="setTool('draw')">그리기</button>
      <button class="dc" id="btnErs" onclick="setTool('erase')">지우기</button>
      <button class="dc" onclick="clearCanvas()">초기화</button>
      <div class="cdots">
        <div class="cdot on" style="background:#FFFFFF" onclick="setColor(0)"></div>
        <div class="cdot" style="background:#3D5A3E" onclick="setColor(1)"></div>
        <div class="cdot" style="background:#8B6F47" onclick="setColor(2)"></div>
        <div class="cdot" style="background:#555" onclick="setColor(3)"></div>
      </div>
    </div>

    <div class="br-row">
      <span class="br-lbl">굵기</span>
      <input type="range" id="bSz" min="1" max="20" value="3">
    </div>
  </div>

  <button class="go-preview" onclick="goPreview()">라벨 미리보기 →</button>
</div>

</div>

</div>

      <div class="fh">Imgur / GitHub raw URL 권장. Notion: 이미지 우클릭 → 이미지 주소 복사</div>
    </div>

    <div class="fr">
      <div class="fg"><label class="fl">물 주기</label><input type="text" class="fi" id="fWater" placeholder="주 1회"></div>
      <div class="fg"><label class="fl">햇빛</label><input type="text" class="fi" id="fSun" placeholder="반음지"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">최적 온도</label><input type="text" class="fi" id="fTemp" placeholder="18–28°C"></div>

      <button class="m-save" onclick="savePlant()">저장</button>
    </div>
  </div>
</div>

// ══════════════════════════════
// ASCII ENGINE
// ══════════════════════════════
const NOKCHI_CHARS = 'N/og';

// ── 배경제거 (캐시 포함)
const _bgCache = new Map();

function getAlphaMask(px, cols, rows) {
  const key = cols + 'x' + rows + ':' + px[0] + px[4] + px[px.length - 4];
  if (_bgCache.has(key)) return _bgCache.get(key);

  // 밝기 배열
  const lum = new Float32Array(cols * rows);
  for (let idx = 0; idx < cols * rows; idx++) {
    const i = idx * 4;
    lum[idx] = px[i] * 0.299 + px[i+1] * 0.587 + px[i+2] * 0.114;
  }

  // 국소 분산 (3×3 이웃, 선명도 = 전경 신호)
  const variance = new Float32Array(cols * rows);
  for (let r = 1; r < rows - 1; r++) for (let c = 1; c < cols - 1; c++) {
    let sum = 0, sum2 = 0;
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const v = lum[(r+dr)*cols+(c+dc)];
      sum += v; sum2 += v*v;
    }
    const mean = sum / 9;
    variance[r*cols+c] = sum2/9 - mean*mean;
  }

  // 채도 (색이 있으면 전경)
  const alpha = new Uint8Array(cols * rows);
  for (let idx = 0; idx < cols * rows; idx++) {
    const i = idx * 4;
    const R = px[i], G = px[i+1], B = px[i+2];
    const sat = (Math.max(R,G,B) - Math.min(R,G,B)) / 255;
    // 분산 + 채도 결합
    const score = variance[idx] * 0.04 + sat * 80;
    alpha[idx] = score > 18 ? 255 : 0;
  }

  // 침식: 완전히 고립된 점만 제거
  const eroded = new Uint8Array(cols * rows);
  for (let r = 1; r < rows-1; r++) for (let c = 1; c < cols-1; c++) {
    if (!alpha[r*cols+c]) continue;
    let cnt = 0;
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      if (alpha[(r+dr)*cols+(c+dc)]) cnt++;
    }
    if (cnt >= 3) eroded[r*cols+c] = 255;
  }

  // 팽창: 1px만 — 엣지 디테일 보존
  const expanded = new Uint8Array(cols * rows);
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    if (eroded[r*cols+c]) { expanded[r*cols+c] = 255; continue; }
    let found = false;
    outer: for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const nr = r+dr, nc = c+dc;
      if (nr>=0 && nr<rows && nc>=0 && nc<cols && eroded[nr*cols+nc]) { found=true; break outer; }
    }
    if (found) expanded[r*cols+c] = 255;
  }

  _bgCache.set(key, expanded);
  return expanded;
}

function renderASCII(imgEl, canvas) {
  const W = canvas.offsetWidth; const H = canvas.offsetHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const FS = 5; const CW = FS * 0.85; const CH = 9;
  const cols = Math.floor(W / CW); const rows = Math.floor(H / CH);
  const off = document.createElement('canvas');
  off.width = cols; off.height = rows;
  const octx = off.getContext('2d');
  octx.drawImage(imgEl, 0, 0, cols, rows);
  const px = octx.getImageData(0,0,cols,rows).data;

  const alphaMask = getAlphaMask(px, cols, rows);

  const bright = new Float32Array(cols * rows);
  const sat    = new Float32Array(cols * rows);
  let minB = 1, maxB = 0;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    const i = (r * cols + c) * 4;
    const R = px[i]/255, G = px[i+1]/255, B = px[i+2]/255;
    const b = R*.299 + G*.587 + B*.114;
    bright[r*cols+c] = b;
    sat[r*cols+c] = Math.max(R,G,B) - Math.min(R,G,B);
    if (b < minB) minB = b;
    if (b > maxB) maxB = b;
  }
  const range = maxB - minB || 1;

  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#fff';
  ctx.font = `400 ${FS}px 'nokchilog_3', monospace`;
  ctx.textBaseline = 'top';

  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    if (alphaMask[r * cols + c] < 128) continue;
    const norm = (bright[r*cols+c] - minB) / range;
    const saturation = sat[r*cols+c];
    const prob = Math.pow(1 - norm, 1.6) * (0.65 + saturation * 0.4);
    if (Math.random() < prob) {
      ctx.fillText(NOKCHI_CHARS[Math.floor(Math.random() * NOKCHI_CHARS.length)], c*CW, r*CH);
    }
  }
}

function attachAscii(triggerEl, imgEl, asciiWrap) {
  const cv = asciiWrap.querySelector('canvas');
  let done = false;
  const isMobile = () => window.matchMedia('(hover: none)').matches;

  let rendering = false;
  const doRender = async () => {
    if (done || rendering || !imgEl.complete || !imgEl.naturalWidth) return;
    rendering = true;
    cv.style.width = '100%'; cv.style.height = '100%';
    await document.fonts.load("400 5px 'nokchilog_3'");
    renderASCII(imgEl, cv);
    done = true;
    rendering = false;
  };

  const go = () => {
    // 데스크탑: hover
    triggerEl.addEventListener('mouseenter', doRender);

    // 모바일: single-tap 토글 (pinch zoom 제외)
    let touchStartCount = 0;
    triggerEl.addEventListener('touchstart', (e) => {
      touchStartCount = e.touches.length;
    }, { passive: true });
    triggerEl.addEventListener('touchend', (e) => {
      if (!isMobile()) return;
      if (touchStartCount > 1) return; // pinch — skip
      e.preventDefault();
      doRender();
      const isShowing = triggerEl.classList.contains('ascii-active');
      triggerEl.classList.toggle('ascii-active', !isShowing);
    }, { passive: false });

    // 실제 레이아웃 크기 변화 시에만 리렌더 (pinch zoom DPR 변화 무시)
    let lastW = 0;
    window.addEventListener('resize', () => {
      const newW = triggerEl.offsetWidth;
      if (Math.abs(newW - lastW) > 2) { done = false; lastW = newW; }
    });
  };

  if (imgEl.complete && imgEl.naturalWidth > 0) go();
  else imgEl.addEventListener('load', go);
}

// CANVAS
// ══════════════════════════════
function initCanvas() {
  const c = document.getElementById('drawCanvas');
  const r = c.getBoundingClientRect();
  c.width = r.width * devicePixelRatio;
  c.height = r.height * devicePixelRatio;
  const ctx = c.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  ctx.fillStyle = '#111'; ctx.fillRect(0,0,r.width,r.height);
}

const dc = document.getElementById('drawCanvas');
function getPos(e, el) {
  const r = el.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX-r.left, y: t.clientY-r.top };
}

dc.addEventListener('mousedown', e=>{isDrawing=true;const p=getPos(e,dc);lastX=p.x;lastY=p.y;});
dc.addEventListener('mousemove', e=>{
  if(!isDrawing)return;
  const ctx=dc.getContext('2d');const p=getPos(e,dc);const sz=parseInt(document.getElementById('bSz').value);
  ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);
  ctx.strokeStyle=currentTool==='erase'?'#111':currentColor;
  ctx.lineWidth=currentTool==='erase'?sz*3:sz;
  ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  lastX=p.x;lastY=p.y;
});
dc.addEventListener('mouseup',()=>isDrawing=false);
dc.addEventListener('mouseleave',()=>isDrawing=false);
dc.addEventListener('touchstart',e=>{e.preventDefault();isDrawing=true;const p=getPos(e,dc);lastX=p.x;lastY=p.y;},{passive:false});
dc.addEventListener('touchmove',e=>{
  e.preventDefault();if(!isDrawing)return;
  const ctx=dc.getContext('2d');const p=getPos(e,dc);const sz=parseInt(document.getElementById('bSz').value);
  ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);
  ctx.strokeStyle=currentTool==='erase'?'#111':currentColor;
  ctx.lineWidth=currentTool==='erase'?sz*3:sz;
  ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  lastX=p.x;lastY=p.y;
},{passive:false});
dc.addEventListener('touchend',()=>isDrawing=false);

function clearCanvas() {
  const c=document.getElementById('drawCanvas');
  const ctx=c.getContext('2d');
  ctx.fillStyle='#111';ctx.fillRect(0,0,c.width,c.height);
}
function setTool(t) {
  currentTool=t;
  document.getElementById('btnDrw').classList.toggle('on',t==='draw');
  document.getElementById('btnErs').classList.toggle('on',t==='erase');
}

  currentColor=colors[i];

}

    nameEn:document.getElementById('fEn').value.trim(),
    images,
    water:document.getElementById('fWater').value.trim(),
    sun:document.getElementById('fSun').value.trim(),
    temp:document.getElementById('fTemp').value.trim(),
    air:document.getElementById('fAir').value.trim(),
    copy:document.getElementById('fCopy').value.trim(),
  };
  if(!data.nameKo){alert('식물 이름을 입력해주세요');return;}
  if(id){
    const idx=plants.findIndex(p=>p.id===parseInt(id));
    plants[idx]={...plants[idx],...data};
  } else {
    data.id=Date.now();plants.push(data);
  }
  savePlants();renderAdminList();renderList(plants);closeModal();
}

function deletePlant(id) {
  if(!confirm('삭제할까요?'))return;
  plants=plants.filter(p=>p.id!==id);
  savePlants();renderAdminList();renderList(plants);
}

// ══════════════════════════════
// INIT
// ══════════════════════════════
renderList(plants);
</script>
</body>
</html>
